name: Runtime smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'templates/**'
      - 'scripts/runtime-smoke.mjs'
      - '.github/workflows/runtime-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '20 5 * * *'

permissions:
  contents: read

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Docker runtime smoke
        run: node scripts/runtime-smoke.mjs
      - name: Docker state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker volume ls || true
