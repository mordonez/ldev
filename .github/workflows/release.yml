name: Release packaging

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the package to npm after validation
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  package-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - name: Build release package
        run: |
          rm -f mordonez-ldev-*.tgz mordonez-ldev-*-checksums.txt
          npm pack
          PACKAGE_FILE="$(ls mordonez-ldev-*.tgz)"
          CHECKSUM_FILE="${PACKAGE_FILE%.tgz}-checksums.txt"
          sha256sum "$PACKAGE_FILE" > "$CHECKSUM_FILE"
          {
            echo "PACKAGE_FILE=$PACKAGE_FILE"
            echo "CHECKSUM_FILE=$CHECKSUM_FILE"
          } >> "$GITHUB_ENV"
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.17.5
        with:
          path: ${{ env.PACKAGE_FILE }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0.17.5
        with:
          path: ${{ env.PACKAGE_FILE }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - name: Upload dry-run artifacts
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-package
          path: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.CHECKSUM_FILE }}
            sbom.cyclonedx.json
            sbom.spdx.json
      - name: Attach package assets to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.CHECKSUM_FILE }}
            sbom.cyclonedx.json
            sbom.spdx.json
      - name: Publish to npm
        if: >-
          ${{
            (github.event_name == 'release' && vars.NPM_PUBLISH_ENABLED == 'true') ||
            (github.event_name == 'workflow_dispatch' && inputs.publish_to_npm)
          }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Explain skipped npm publish
        if: >-
          ${{
            !(
              (github.event_name == 'release' && vars.NPM_PUBLISH_ENABLED == 'true') ||
              (github.event_name == 'workflow_dispatch' && inputs.publish_to_npm)
            )
          }}
        run: |
          echo "npm publish skipped."
          echo "Set repository variable NPM_PUBLISH_ENABLED=true for release-triggered publishes,"
          echo "or run this workflow manually with publish_to_npm=true when final sign-off is complete."
