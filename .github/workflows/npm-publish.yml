name: Publish npm Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ldev-v${{ inputs.version }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify requested version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
            echo "Requested version ${{ inputs.version }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Check npm publication status
        id: npm_status
        run: |
          if npm view "@mordonezdev/ldev@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@mordonezdev/ldev@${{ inputs.version }} is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci --ignore-scripts
        if: ${{ steps.npm_status.outputs.published != 'true' }}

      - run: npm run check
        if: ${{ steps.npm_status.outputs.published != 'true' }}

      - name: Publish to npm
        if: ${{ steps.npm_status.outputs.published != 'true' }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
