name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:integration
      - run: npm run test:coverage:unit

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --omit=dev --ignore-scripts
      - name: npm audit --omit=dev
        continue-on-error: ${{ vars.NPM_AUDIT_ENFORCE == 'false' }}
        run: npm audit --omit=dev

  smoke:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test:smoke
      - name: Binary smoke test
        run: |
          node dist/index.js --help
          node dist/index.js doctor --json || true
      - name: Installed binary smoke test
        run: |
          PACK_JSON="$(npm pack --json --ignore-scripts)"
          PACKAGE_FILE="$(printf '%s' "$PACK_JSON" | node scripts/extract-pack-filename.mjs)"
          npm install -g "./$PACKAGE_FILE"
          ldev --help
          ldev --version

  smoke-windows:
    needs: check
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run test:smoke

  package:
    needs: [smoke, smoke-windows, security-audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Create release package
        run: |
          rm -f mordonezdev-ldev-*.tgz mordonezdev-ldev-*-checksums.txt
          PACK_JSON="$(npm pack --json --ignore-scripts)"
          PACKAGE_FILE="$(printf '%s' "$PACK_JSON" | node scripts/extract-pack-filename.mjs)"
          CHECKSUM_FILE="${PACKAGE_FILE%.tgz}-checksums.txt"
          sha256sum "$PACKAGE_FILE" > "$CHECKSUM_FILE"
          {
            echo "PACKAGE_FILE=$PACKAGE_FILE"
            echo "CHECKSUM_FILE=$CHECKSUM_FILE"
          } >> "$GITHUB_ENV"
      - name: Check package size
        run: |
          SIZE=$(stat -c%s "$PACKAGE_FILE")
          echo "Package size: $SIZE bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::error::Package exceeds 5MB limit"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-node24
          path: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.CHECKSUM_FILE }}
