name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
      - run: npm run test:integration
      - run: npm run test:coverage

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=dev --ignore-scripts
      - name: npm audit --omit=dev
        continue-on-error: ${{ vars.NPM_AUDIT_ENFORCE == 'false' }}
        run: npm audit --omit=dev

  smoke:
    needs: [check, security-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:smoke
      - name: Binary smoke test
        run: |
          node dist/index.js --help
          node dist/index.js doctor --json || true
      - name: Installed binary smoke test
        run: |
          npm pack
          npm install -g mordonez-ldev-*.tgz
          ldev --help
          ldev --version

  package:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create release package
        run: |
          rm -f mordonez-ldev-*.tgz mordonez-ldev-*-checksums.txt
          npm pack
          PACKAGE_FILE="$(ls mordonez-ldev-*.tgz)"
          CHECKSUM_FILE="${PACKAGE_FILE%.tgz}-checksums.txt"
          sha256sum "$PACKAGE_FILE" > "$CHECKSUM_FILE"
          {
            echo "PACKAGE_FILE=$PACKAGE_FILE"
            echo "CHECKSUM_FILE=$CHECKSUM_FILE"
          } >> "$GITHUB_ENV"
      - name: Check package size
        run: |
          SIZE=$(stat -c%s "$PACKAGE_FILE")
          echo "Package size: $SIZE bytes"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "::error::Package exceeds 5MB limit"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-package-node22
          path: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.CHECKSUM_FILE }}
