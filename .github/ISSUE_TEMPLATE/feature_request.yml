name: Feature request
description: Suggest a concrete improvement to ldev
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What concrete workflow is painful today?
    validations:
      required: true
  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      description: Describe the behavior you want, not just the name of a command.
    validations:
      required: true
  - type: textarea
    id: liferay_context
    attributes:
      label: Liferay context
      description: Explain why this matters specifically for Liferay/DXP local work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing commands, scripts, or manual workflows you tried
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: This request is about ldev itself, not general Liferay product support
          required: true
        - label: I checked the docs and existing issues first
          required: true
