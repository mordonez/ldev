include-and-override=portal-developer.properties

# Basic dev-friendly settings
virtual.hosts.valid.hosts=*
http.header.version.verbosity=off

# Locales
locales.enabled=en_US,es_ES

# Fuerza el host externo para URLs de recursos (imágenes, CSS, JS).
# Necesario cuando el portal se accede por IP o hostname distinto al del contenedor.
# Dejar vacío para que Liferay lo detecte automáticamente desde la request.
#web.server.host=
