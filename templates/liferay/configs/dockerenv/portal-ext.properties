include-and-override=portal-developer.properties

# Basic dev-friendly settings
virtual.hosts.valid.hosts=*
http.header.version.verbosity=off

# Locales
locales.enabled=en_US,es_ES

# Force the external host for resource URLs (images, CSS, JS).
# Necessary when the portal is accessed by an IP or hostname different from the container's.
# Leave empty so Liferay detects it automatically from the request.
#web.server.host=
